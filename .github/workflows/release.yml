name: Release Userscript

on:
  push:
    branches: [main]
    paths:
      - 'tampermonkey/cookie-share.user.js'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from userscript
        id: version
        run: |
          VERSION=$(grep -oP '@version\s+\K\S+' tampermonkey/cookie-share.user.js)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            tampermonkey/cookie-share.user.js \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
